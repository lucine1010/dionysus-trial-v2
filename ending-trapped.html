<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dionysus: Trapped Ending</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/roleplay.css" />
</head>
<body>
  <nav id="hud">
    <div class="grape-display">
      <img src="img/icons8-grape-60.png" alt="Grape icon" class="grape-icon">
      <span>Grapes: <span id="grape-count">5</span>/5</span>
    </div>
  </nav>

  <section id="quest2" class="page">
    <div class="roleplay-screen">
      <div class="portrait left active" id="apollo-portrait">
        <img src="roleplay1/A-normal.png" id="apollo-img" alt="Apollo" />
      </div>

      <div class="portrait right dim" id="dion-portrait">
        <img src="roleplay1/D-normal.png" id="dion-img" alt="Dionysus" />
      </div>

      <div class="dialogue-footer">
        <div class="name-tag cathdra" id="speaker-name">NARRATION</div>
        <div class="dialogue-content">
          <p id="apollo-text"></p>
          <div id="apollo-choices" class="choices-container"></div>
        </div>
      </div>
    </div>
  </section>

  <script src="js/ending-trapped-data.js"></script>
  <script src="js/roleplay-engine.js"></script>
  <script src="js/ending-trapped.js"></script>
</body>
</html>
