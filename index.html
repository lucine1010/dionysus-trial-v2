<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dionysus: The Dream Trial</title>
    <link rel="stylesheet" href="css/style.css">
<style>
  @font-face {
    font-family: 'CathdraHero';
    src: url('fonts/IT Cathdra Demo.otf') format('opentype');
    font-display: swap;
  }

  .home-title-gothic {
    font-family: 'CathdraHero', serif !important;
  }
</style>
</head>
<body>

    <nav id="hud">
       <div class="grape-display">
  <img src="img/icons8-grape-60.png" alt="Grape icon" class="grape-icon">
  <span>Grapes: <span id="grape-count">0</span>/5</span>
</div>
    </nav>

    <div id="chatbot-container">
        <div id="chatbot-window" class="hidden">
            <div id="chatbot-header">Satyr (Guide)</div>
            <div id="chatbot-history"></div>
            <div id="chatbot-input-area">
                <input type="text" id="user-input" placeholder="Type YES to join...">
                <button onclick="sendMessage()">SEND</button>
            </div>
        </div>
        <div id="satyr-trigger" onclick="toggleChat()">
            <img src="img/satyr.png" alt="Satyr Sprite">
        </div>
    </div>

    <section id="campus" class="page">
        <div class="campus-bg"></div>
        <div class="overlay"></div>
        
        <div class="hero-container">
            <div class="hero-content">
                <p class="hero-subtitle">PROUDLY PRESENT THE DREAM TRIAL</p>
                <h1 class="hero-title home-title-gothic">Dionysus</h1>
                <p class="hero-description">God of Wine, Revelry, and Shattered Patterns</p>
                <a href="quest.html" class="start-btn">BEGIN THE TRIAL</a>
            </div>
        </div>
    </section>



    <script src="js/script.js"></script>
</body>
</html>
